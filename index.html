<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow counter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="page">
        <div class="left-side">
            <div class="arrow-pointer">
                <p>Ты</p>
                <img src="images/arrow2.png" alt="Стрелка">
            </div>
            <img class="cat-image" src="images/open_cat.png" alt="Котик">
        </div>

        <div class="right-side">
            <div class="slider-panel">
                <h1 class="slider-title">Ты котик, выбери как часто ты мяукаешь?</h1>
                <input id="meow-slider" class="meow-slider" type="range" min="1" max="10" value="5">
                <div class="meow-value">5 мяу в минуту</div>
                <button id="calculate-button" class="calculate-button" type="button">Рассчитать в мяуканьях</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
